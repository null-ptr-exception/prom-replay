global:
  imageRegistry: ""

replayManager:
  image:
    registry: ghcr.io
    repository: rophy/prom-replay/replay-manager
    tag: latest
    pullPolicy: IfNotPresent
  podAnnotations:
    sidecar.istio.io/inject: "false"
  nodeSelector: {}
  affinity: {}
  tolerations: []
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 512Mi

victoriametrics:
  image:
    registry: docker.io
    repository: victoriametrics/victoria-metrics
    tag: v1.106.1
    pullPolicy: IfNotPresent
  retentionPeriod: "30d"
  maxUniqueTimeseries: "1000000"
  podAnnotations:
    sidecar.istio.io/inject: "false"
  nodeSelector: {}
  affinity: {}
  tolerations: []
  extraArgs: []
  rbac:
    clusterWide: false
  scrapeConfig: {}
  persistence:
    size: 16Gi
    storageClass: ""
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi

minio:
  image:
    registry: quay.io
    repository: minio/minio
    tag: RELEASE.2024-12-18T13-15-44Z
    pullPolicy: IfNotPresent
  rootUser: minioadmin
  rootPassword: minioadmin
  podAnnotations:
    sidecar.istio.io/inject: "false"
  nodeSelector: {}
  affinity: {}
  tolerations: []
  persistence:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      memory: 256Mi

grafana:
  image:
    registry: docker.io
    repository: grafana/grafana-oss
    tag: "12.4.3-ubuntu"
    pullPolicy: IfNotPresent
  podAnnotations:
    sidecar.istio.io/inject: "false"
  nodeSelector: {}
  affinity: {}
  tolerations: []
  persistence:
    size: 1Gi
    storageClass: ""
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
  extraVolumes: []
  extraVolumeMounts: []

dashboards:
  maxSizeBytes: 1048576
