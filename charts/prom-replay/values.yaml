global:
  imageRegistry: ""

replayManager:
  image:
    registry: ghcr.io
    repository: rophy/prom-replay/replay-manager
    tag: latest
    pullPolicy: IfNotPresent
  nodeSelector: {}
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 512Mi

victoriametrics:
  image:
    registry: docker.io
    repository: victoriametrics/victoria-metrics
    tag: v1.106.1
    pullPolicy: IfNotPresent
  retentionPeriod: "30d"
  maxUniqueTimeseries: "1000000"
  nodeSelector: {}
  scrapeConfig: {}
  persistence:
    size: 16Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi

minio:
  image:
    registry: quay.io
    repository: minio/minio
    tag: RELEASE.2024-12-18T13-15-44Z
    pullPolicy: IfNotPresent
  rootUser: minioadmin
  rootPassword: minioadmin
  nodeSelector: {}
  persistence:
    size: 10Gi
  resources:
    requests:
      memory: 256Mi

grafana:
  image:
    registry: docker.io
    repository: grafana/grafana-oss
    tag: "12.4.3-ubuntu"
    pullPolicy: IfNotPresent
  nodeSelector: {}
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
  extraVolumes: []
  extraVolumeMounts: []

dashboards:
  maxSizeBytes: 1048576
