{{- if .Values.victoriametrics.scrapeConfig }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "prom-replay.fullname" . }}-victoriametrics-scrape
  labels:
    {{- include "prom-replay.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoriametrics
data:
  scrape.yaml: |
    {{- toYaml .Values.victoriametrics.scrapeConfig | nindent 4 }}
{{- end }}
