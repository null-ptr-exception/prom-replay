apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "prom-replay.fullname" . }}-victoriametrics
  labels:
    {{- include "prom-replay.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoriametrics
spec:
  serviceName: {{ include "prom-replay.fullname" . }}-victoriametrics
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "prom-replay.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: victoriametrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "prom-replay.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: victoriametrics
    spec:
      containers:
        - name: victoriametrics
          image: {{ include "prom-replay.image" (dict "imageValues" .Values.victoriametrics.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.victoriametrics.image.pullPolicy }}
          args:
            - --retentionPeriod={{ .Values.victoriametrics.retentionPeriod }}
            - --search.maxUniqueTimeseries={{ .Values.victoriametrics.maxUniqueTimeseries }}
          ports:
            - name: http
              containerPort: 8428
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /storage
          resources:
            {{- toYaml .Values.victoriametrics.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.victoriametrics.persistence.size }}
