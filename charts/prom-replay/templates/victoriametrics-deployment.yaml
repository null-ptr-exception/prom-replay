apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "prom-replay.fullname" . }}-victoriametrics
  labels:
    {{- include "prom-replay.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoriametrics
spec:
  serviceName: {{ include "prom-replay.fullname" . }}-victoriametrics
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "prom-replay.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: victoriametrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "prom-replay.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: victoriametrics
     {{- if or .Values.victoriametrics.podAnnotations .Values.victoriametrics.scrapeConfig }}
      annotations:
        {{- with .Values.victoriametrics.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.victoriametrics.scrapeConfig }}
        scrape-config-checksum: {{ toYaml .Values.victoriametrics.scrapeConfig | sha256sum | quote }}
        {{- end }}
     {{- end }}
     {{- if .Values.victoriametrics.scrapeConfig }}
     annotations: 
       scrape-config-checksum: {{ toYaml .Values.victoriametrics.scrapeConfig | sha256sum | quote }}
     {{- end }}
    spec:
      {{- if .Values.victoriametrics.scrapeConfig }}
      serviceAccountName: {{ include "prom-replay.fullname" . }}-victoriametrics
      {{- end }}
      containers:
        - name: victoriametrics
          image: {{ include "prom-replay.image" (dict "imageValues" .Values.victoriametrics.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.victoriametrics.image.pullPolicy }}
          args:
            - --retentionPeriod={{ .Values.victoriametrics.retentionPeriod }}
            - --search.maxUniqueTimeseries={{ .Values.victoriametrics.maxUniqueTimeseries }}
            {{- if .Values.victoriametrics.scrapeConfig }}
            - --promscrape.config=/etc/victoriametrics/scrape.yaml
            {{- end }}
            {{- range .Values.victoriametrics.extraArgs }}
            - {{ . }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8428
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /storage
            {{- if .Values.victoriametrics.scrapeConfig }}
            - name: scrape-config
              mountPath: /etc/victoriametrics
            {{- end }}
          resources:
            {{- toYaml .Values.victoriametrics.resources | nindent 12 }}
      {{- with .Values.victoriametrics.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.victoriametrics.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.victoriametrics.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{- if .Values.victoriametrics.scrapeConfig }}
        - name: scrape-config
          configMap:
            name: {{ include "prom-replay.fullname" . }}-victoriametrics-scrape
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.victoriametrics.persistence.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.victoriametrics.persistence.size }}
