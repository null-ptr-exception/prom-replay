apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "prom-replay.fullname" . }}-dashboard-provider
  labels:
    {{- include "prom-replay.labels" . | nindent 4 }}
data:
  default.yaml: |-
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
