apiVersion: v1
kind: Service
metadata:
  name: {{ include "prom-replay.fullname" . }}-victoriametrics
  labels:
    {{- include "prom-replay.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoriametrics
spec:
  type: ClusterIP
  ports:
    - port: 8428
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "prom-replay.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: victoriametrics
