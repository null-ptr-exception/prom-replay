apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "prom-replay.fullname" . }}-grafana
  labels:
    {{- include "prom-replay.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  serviceName: {{ include "prom-replay.fullname" . }}-grafana
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "prom-replay.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "prom-replay.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: grafana
      {{- with .Values.grafana.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: {{ include "prom-replay.image" (dict "imageValues" .Values.grafana.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.grafana.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            {{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
            - name: dashboard-{{ $path | base | trimSuffix ".json" }}
              mountPath: /var/lib/grafana/dashboards/{{ $path | base }}
              subPath: {{ $path | base }}
            {{- end }}
            {{- with .Values.grafana.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /grafana/api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /grafana/api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
      {{- with .Values.grafana.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.grafana.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.grafana.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: datasources
          configMap:
            name: {{ include "prom-replay.fullname" . }}-grafana-datasource
        - name: dashboard-providers
          configMap:
            name: {{ include "prom-replay.fullname" . }}-dashboard-provider
        {{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
        - name: dashboard-{{ $path | base | trimSuffix ".json" }}
          configMap:
            name: {{ include "prom-replay.fullname" $ }}-{{ $path | base | trimSuffix ".json" }}
        {{- end }}
        {{- with .Values.grafana.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.grafana.persistence.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.grafana.persistence.size }}
