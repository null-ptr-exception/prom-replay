apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "prom-replay.fullname" . }}-grafana
  labels:
    {{- include "prom-replay.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "prom-replay.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "prom-replay.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.grafana.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: plugin-provisioning
              mountPath: /etc/grafana/provisioning/plugins
            {{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
            - name: dashboard-{{ $path | base | trimSuffix ".json" }}
              mountPath: /var/lib/grafana/dashboards/{{ $path | base }}
              subPath: {{ $path | base }}
            {{- end }}
            {{- with .Values.grafana.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
      volumes:
        - name: datasources
          configMap:
            name: {{ include "prom-replay.fullname" . }}-grafana-datasource
        - name: dashboard-providers
          configMap:
            name: {{ include "prom-replay.fullname" . }}-dashboard-provider
        - name: plugin-provisioning
          configMap:
            name: {{ include "prom-replay.fullname" . }}-grafana-plugins
        {{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
        - name: dashboard-{{ $path | base | trimSuffix ".json" }}
          configMap:
            name: {{ include "prom-replay.fullname" $ }}-{{ $path | base | trimSuffix ".json" }}
        {{- end }}
        {{- with .Values.grafana.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
