suite: victoriametrics-rbac
templates:
  - victoriametrics-rbac.yaml
tests:
  - it: should create ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount

  - it: should not create ServiceAccount when create is false
    set:
      victoriametrics.serviceAccount.create: false
    asserts:
      - notExists:
          kind: ServiceAccount

  - it: should add annotations to ServiceAccount
    set:
      victoriametrics.serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/vm-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/vm-role

  - it: should create namespaced Role by default when scrapeConfig is set
    set:
      victoriametrics.scrapeConfig:
        global:
          scrape_interval: 5s
    asserts:
      - hasDocuments:
          count: 3
      - isKind:
          of: ServiceAccount
        documentIndex: 0
      - isKind:
          of: Role
        documentIndex: 1
      - isKind:
          of: RoleBinding
        documentIndex: 2

  - it: should only grant namespace-scoped permissions in Role
    set:
      victoriametrics.scrapeConfig:
        global:
          scrape_interval: 5s
    documentIndex: 1
    asserts:
      - equal:
          path: rules[0].resources
          value: [pods, services, endpoints]

  - it: should create ClusterRole when rbac.clusterWide is true
    set:
      victoriametrics.scrapeConfig:
        global:
          scrape_interval: 5s
      victoriametrics.rbac.clusterWide: true
    asserts:
      - hasDocuments:
          count: 3
      - isKind:
          of: ServiceAccount
        documentIndex: 0
      - isKind:
          of: ClusterRole
        documentIndex: 1
      - isKind:
          of: ClusterRoleBinding
        documentIndex: 2

  - it: should include node permissions in ClusterRole
    set:
      victoriametrics.scrapeConfig:
        global:
          scrape_interval: 5s
      victoriametrics.rbac.clusterWide: true
    documentIndex: 1
    asserts:
      - contains:
          path: rules[0].resources
          content: nodes
