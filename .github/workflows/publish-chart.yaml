name: Helm Chart

on:
  push:
    branches: [main]
    paths:
      - charts/**
  pull_request:
    paths:
      - charts/**
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  CHART_PATH: charts/prom-replay

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --verify=false

      - name: Run unit tests
        run: helm unittest ${{ env.CHART_PATH }}

  publish:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Check version not already published
        run: |
          VERSION=$(grep '^version:' ${{ env.CHART_PATH }}/Chart.yaml | awk '{print $2}')
          if helm pull oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/prom-replay/charts/prom-replay --version "$VERSION" -d /tmp 2>/dev/null; then
            echo "::error::Chart version $VERSION already exists in registry. Bump the version in Chart.yaml before publishing."
            exit 1
          fi
          echo "Version $VERSION is available"

      - name: Package chart
        run: helm package ${{ env.CHART_PATH }} -d /tmp/charts

      - name: Push to GHCR
        run: helm push /tmp/charts/prom-replay-*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/prom-replay/charts
